name: CI - Model Training & Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/california-housing-model

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Check Env
      run: |
        python --version
        pip --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow matplotlib

    - name: Run mlflow project
      working-directory: MLProject
      run: |
        python modelling.py \
          --n_estimators 100 \
          --max_depth 10 \
          --min_samples_split 2 \
          --min_samples_leaf 1 \
          --test_size 0.2

    - name: Get latest MLflow run_id
      working-directory: MLProject
      run: |
        RUN_ID=$(cat run_id.txt)
        echo "Latest Run ID: $RUN_ID"

    - name: Install Python dependencies
      run: |
        echo "Checking if MLFlow is installed or other Python dependencies"
        pip show mlflow || pip install mlflow

    - name: Upload to Google Drive
      run: |
        echo "Upload to Google Drive step - currently placeholder as no script/credentials provided."

    - name: Build Docker Model
      working-directory: MLProject
      run: |
        RUN_ID=$(cat run_id.txt)
        echo "Building Docker image for Run ID: $RUN_ID"
        mlflow models build-docker -m "mlruns/0/$RUN_ID/artifacts/model" -n ${{ env.DOCKER_IMAGE }}:latest

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag ${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_IMAGE }}:latest
        docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
