name: CI - Model Training & Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/california-housing-model

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow matplotlib

    - name: Train model
      working-directory: MLProject
      run: |
        python modelling.py \
          --n_estimators 100 \
          --max_depth 10 \
          --min_samples_split 2 \
          --min_samples_leaf 1 \
          --test_size 0.2

    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: |
          MLProject/mlruns/
          MLProject/run_id.txt
        retention-days: 30

  build-docker:
    needs: train-model
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install MLflow
      run: pip install mlflow

    - name: Download model artifacts
      uses: actions/download-artifact@v4
      with:
        name: model-artifacts
        path: MLProject/

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image using mlflow
      working-directory: MLProject
      run: |
        RUN_ID=$(cat run_id.txt)
        echo "Building Docker image for Run ID: $RUN_ID"
        mlflow models build-docker -m "mlruns/0/$RUN_ID/artifacts/model" -n ${{ env.DOCKER_IMAGE }}:latest
        docker tag ${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        docker push ${{ env.DOCKER_IMAGE }}:latest
        docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

    - name: Output image info
      run: |
        echo "Docker image pushed successfully!"
        echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
